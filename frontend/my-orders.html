<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders - Uniformity</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="page-wrapper">
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="icon-btn mobile-nav-toggle" type="button"><i class="bi bi-list"></i></button>
          <span style="font-weight:700;font-size:.95rem;">My Orders</span>
        </div>
        <div class="topbar-actions">
          <a href="cart.html" class="icon-btn" title="Cart">
            <i class="bi bi-cart-fill"></i>
          </a>
          <button class="icon-btn" id="profileTopBtn" title="Account" type="button">
            <i class="bi bi-person-fill"></i>
          </button>
        </div>
      </div>

      <div class="content-area">
        <div class="page-title">My Orders</div>
        <p class="page-sub">Track every purchase, check delivery progress, and confirm completed orders.</p>

        <div class="orders-stack mt-4" id="ordersContainer">
          <div class="state-center">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-3 text-muted" style="font-size:.9rem;">Loading your orders...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="confirmReceiptModal" tabindex="-1" aria-labelledby="confirmReceiptModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmReceiptModalLabel">Confirm Receipt</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="d-flex gap-3 align-items-start">
            <div class="stat-icon si-green" style="width:44px;height:44px;font-size:1.15rem;">
              <i class="bi bi-check-circle-fill"></i>
            </div>
            <div>
              <p class="mb-1" style="font-weight:700;color:var(--text);">Confirm that you received this order?</p>
              <p class="mb-0 text-muted" style="font-size:.88rem;">
                This will mark the order as delivered and complete the transaction.
              </p>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn-green" id="confirmReceiptBtn">
            <i class="bi bi-check-circle-fill me-1"></i>Confirm Received
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/my-orders.js"></script>
</body>

</html>
