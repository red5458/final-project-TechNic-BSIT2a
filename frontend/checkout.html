<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – Uniformity</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="page-wrapper">
    <div id="sidebar-placeholder"></div>
    <div class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="icon-btn mobile-nav-toggle"><i class="bi bi-list"></i></button>
          <span style="font-weight:700;">Add New Listing</span>
        </div>
        <div class="topbar-actions">
          <a href="cart.html" class="icon-btn" title="Cart">
            <i class="bi bi-cart-fill"></i>
          </a>
          <button class="icon-btn" id="profileTopBtn" title="Account" type="button">
            <i class="bi bi-person-fill"></i>
          </button>
        </div>
      </div>

      <div class="content-area">
        <div class="page-title">Checkout</div>
        <p class="page-sub">Confirm your delivery details and place your order.</p>

        <div class="row g-4">
          <div class="col-lg-7">
            <div class="table-wrap p-4 mb-4">
              <h6 style="font-size:1.1rem;margin-bottom:1.5rem;">Delivery Information</h6>

              <form id="checkoutForm" action="#" method="POST">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" id="firstName" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="lastName" required />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Street Address <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="street" placeholder="House No., Street Name" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">City / Municipality <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="city" placeholder="e.g., Polangui" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Province</label>
                    <input type="text" class="form-control" id="province" placeholder="e.g., Albay" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Postal Code</label>
                    <input type="text" class="form-control" id="postal" placeholder="e.g., 4506" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Contact Number</label>
                    <input type="tel" class="form-control" id="phone" placeholder="09XX XXX XXXX" />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Delivery Notes</label>
                    <textarea class="form-control" id="notes" rows="2"
                      placeholder="Landmark, gate code, preferred time…"></textarea>
                  </div>
                </div>

                <div class="mt-4 pt-4 border-top">
                  <h6 style="font-size:1.1rem;margin-bottom:1.5rem;">Payment Method</h6>
                  <div class="d-flex flex-column gap-3">
                    <label
                      style="display:flex;align-items:center;gap:1rem;padding:1rem;border:2px solid var(--primary-light);border-radius:var(--radius);cursor:pointer;background:var(--bg-soft);">
                      <input type="radio" name="payment" value="cod" checked style="accent-color:var(--primary);" />
                      <div>
                        <strong>Cash on Delivery</strong>
                        <div style="font-size:.85rem;color:var(--text-muted);">Pay when your uniform arrives</div>
                      </div>
                    </label>
                    <label
                      style="display:flex;align-items:center;gap:1rem;padding:1rem;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;opacity:.6;">
                      <input type="radio" name="payment" value="gcash" disabled />
                      <div><strong>GCash</strong>
                        <div style="font-size:.85rem;color:var(--text-muted);">Coming soon</div>
                      </div>
                    </label>
                  </div>
                  <div class="alert mt-3"
                    style="background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.8rem;color:var(--text-muted);padding:.75rem 1rem;">
                    <i class="bi bi-info-circle-fill me-1" style="color:var(--primary-light);"></i>
                    Each item will be tracked separately per seller. Order status starts as <strong>Pending</strong> →
                    <strong>Confirmed</strong> → <strong>Shipped</strong> → <strong>Delivered</strong>.
                  </div>
                  <button type="submit" class="btn-checkout mt-4" id="placeOrderBtn">
                    <i class="bi bi-bag-check-fill me-2"></i>Place Order &middot; <span id="placeOrderTotal">PHP 0.00</span>
                  </button>
                </div>
              </form>
            </div>
          </div>

          <div class="col-lg-5">
            <div class="order-summary">
              <h5>Your Order</h5>
              <div class="d-flex flex-column gap-3 mb-3" id="checkoutSummaryItems"></div>
              <div class="summary-row"><span>Delivery</span><span>Free</span></div>
              <div class="summary-row summary-total">
                <span>Total</span><span id="checkoutTotal">PHP 0.00</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
