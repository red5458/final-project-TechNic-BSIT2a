<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Uniforms - Uniformity</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="page-wrapper">
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="icon-btn mobile-nav-toggle" type="button" aria-label="Open navigation"><i
              class="bi bi-list"></i></button>
          <div class="topbar-search">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" placeholder="Search uniforms..." />
          </div>
        </div>
        <div class="topbar-actions">
          <a href="cart.html" class="icon-btn" title="Cart">
            <i class="bi bi-cart-fill"></i>
          </a>
          <button class="icon-btn" id="profileTopBtn" title="Account" type="button">
            <i class="bi bi-person-fill"></i>
          </button>
        </div>
      </div>

      <div class="content-area">
        <div class="page-title">Browse Uniforms</div>
        <p class="page-sub">Find the perfect pre-loved uniform at an affordable price.</p>

        <div class="filter-bar">
          <i class="bi bi-funnel-fill text-muted"></i>
          <select class="filter-select" id="filterCategory">
            <option value="">All Categories</option>

          </select>
          <select class="filter-select" id="filterSize">
            <option value="">All Sizes</option>
            <option>XS</option>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
            <option>XXL</option>
          </select>
          <select class="filter-select" id="filterSort">
            <option value="newest">Newest First</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
          </select>
          <span class="ms-auto text-muted" id="listingCount" style="font-size:.85rem;"></span>
        </div>

        <div class="product-grid" id="productGrid"></div>

        <div id="paginationControls" class="d-flex justify-content-center gap-2 mt-4"></div>

      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
</body>

</html>
