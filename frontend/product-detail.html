<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail – Uniformity</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="page-wrapper">
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="icon-btn mobile-nav-toggle"><i class="bi bi-list"></i></button>
          <a href="dashboard.html" style="color:var(--text-muted);font-size:.9rem;"><i
              class="bi bi-arrow-left me-1"></i>Back to Browse</a>
        </div>
        <div class="topbar-actions">
          <a href="cart.html" class="icon-btn" title="Cart">
            <i class="bi bi-cart-fill"></i>
          </a>
          <button class="icon-btn" id="profileTopBtn" title="Account"><i class="bi bi-person-fill"></i></button>
        </div>
      </div>

      <div class="content-area" id="detailContent">

        <!-- Loading state -->
        <div id="detailLoading" class="state-center">
          <div class="spinner-border text-success" role="status"></div>
          <p class="mt-3 text-muted" style="font-size:.9rem;">Loading product details...</p>
        </div>

        <!-- Error state -->
        <div id="detailError" style="display:none;" class="state-center">
          <i class="bi bi-exclamation-circle fs-1 text-muted"></i>
          <p class="mt-3 text-muted">Product not found. <a href="dashboard.html">Go back to Browse</a>.</p>
        </div>

        <!-- Real content populated by product-detail.js -->
        <div id="detailBody" style="display:none;" class="row g-5">
          <div class="col-lg-5">
            <div class="product-detail-img" id="detailImage">
              <i class="bi bi-image" style="color:var(--text-muted);"></i>
            </div>
          </div>
          <div class="col-lg-7">
            <h1 id="detailName" style="font-size:2rem;font-weight:900;margin-bottom:.75rem;"></h1>
            <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
              <div class="product-price" id="detailPrice" style="font-size:2.2rem;margin:0;"></div>
              <span class="status-badge status-available">Available</span>
            </div>
            <div class="d-flex gap-3 mb-4 flex-wrap">
              <div style="background:var(--bg-soft);border-radius:var(--radius-sm);padding:.5rem 1rem;font-size:.9rem;">
                <span style="color:var(--text-muted);">Size:</span> <strong id="detailSize"></strong>
              </div>
              <div style="background:var(--bg-soft);border-radius:var(--radius-sm);padding:.5rem 1rem;font-size:.9rem;">
                <span style="color:var(--text-muted);">Qty left:</span> <strong id="detailQty"></strong>
              </div>
              <div style="background:var(--bg-soft);border-radius:var(--radius-sm);padding:.5rem 1rem;font-size:.9rem;">
                <span style="color:var(--text-muted);">Category:</span> <strong id="detailCategory"></strong>
              </div>
            </div>
            <div style="background:var(--bg-soft);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;">
              <h6
                style="margin-bottom:.75rem;font-size:.9rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">
                Description</h6>
              <p id="detailDescription" style="margin:0;line-height:1.7;color:var(--text);"></p>
            </div>
            <div class="product-detail-actions d-flex align-items-center gap-3 mb-4 flex-wrap">
              <div class="qty-control">
                <button class="qty-btn" id="qtyMinus">−</button>
                <span class="qty-display" id="qtyDisplay"
                  style="padding:0 .75rem;font-weight:700;font-size:1rem;">1</span>
                <button class="qty-btn" id="qtyPlus">+</button>
              </div>
              <button class="btn-green flex-grow-1" id="addToCartBtn" style="max-width:240px;">
                <i class="bi bi-cart-plus me-2"></i>Add to Cart
              </button>
            </div>
            <div class="seller-card">
              <h6>About the Seller</h6>
              <div class="d-flex align-items-center gap-3">
                <div class="user-avatar" id="sellerAvatar"
                  style="background:var(--primary);color:#fff;width:46px;height:46px;font-size:1rem;"></div>
                <div>
                  <strong id="sellerName"></strong>
                  <div id="sellerEmail" style="font-size:.85rem;color:var(--text-muted);"></div>
                </div>
              </div>
              <div class="seller-contact-panel">
                <div class="seller-contact-heading">
                  <i class="bi bi-chat-dots-fill"></i>
                  <span>Contact Seller</span>
                </div>
                <p id="sellerContactNote" class="seller-contact-note"></p>
                <div class="seller-contact-actions" id="sellerContactActions"></div>
              </div>
            </div>
            <p style="font-size:.8rem;color:var(--text-muted);margin-top:1rem;">
              <i class="bi bi-calendar3 me-1" style="color:var(--primary-light);"></i>
              <span id="detailListedDate"></span>
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/product-detail.js"></script>
</body>

</html>
